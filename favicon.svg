<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="#FFF3E0" />
      <stop offset="60%" stop-color="#FFE0B2" />
      <stop offset="100%" stop-color="#FFCC80" />
    </radialGradient>

    <!-- Bun Dough Gradient (Warm Golden Brown) -->
    <linearGradient id="doughGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2" />
      <stop offset="40%" stop-color="#DEB887" />
      <stop offset="80%" stop-color="#CD853F" />
      <stop offset="100%" stop-color="#8B4513" />
    </linearGradient>

    <!-- Cinnamon Filling Gradient (Rich Dark Brown) -->
    <linearGradient id="cinnamonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0522D" />
      <stop offset="50%" stop-color="#8B4513" />
      <stop offset="100%" stop-color="#5C2E0B" />
    </linearGradient>

    <!-- Glaze/Frosting Gradient (Creamy White) -->
    <linearGradient id="glazeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5F5DC" />
    </linearGradient>

    <!-- Drop Shadow for App Icon Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5C2E0B" flood-opacity="0.25" />
    </filter>
    
    <!-- Soft Inner Shadow for Dough Layers -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- App Icon Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Main Cinnamon Roll Group with Shadow -->
  <g filter="url(#shadow)">
    
    <!-- BASE DOUGH SHAPE -->
    <path d="M 256 100 
             C 360 100, 420 150, 420 230 
             C 420 320, 350 400, 256 400 
             C 150 400, 92 320, 92 230 
             C 92 150, 150 100, 256 100 Z" 
          fill="url(#doughGrad)" />

    <!-- CINNAMON SPIRAL LAYER -->
    <path d="M 256 120 
             C 340 120, 396 160, 396 230 
             C 396 300, 330 376, 256 376 
             C 170 376, 116 300, 116 230 
             C 116 170, 170 140, 240 140
             C 300 140, 356 180, 356 236 
             C 356 280, 310 336, 256 336 
             C 190 336, 146 286, 146 236
             C 146 196, 190 170, 246 170
             C 286 170, 316 200, 316 236
             C 316 266, 286 296, 250 296
             C 216 296, 186 270, 190 236
             C 190 210, 220 196, 246 196
             C 266 196, 276 210, 276 226
             C 276 236, 266 246, 256 246" 
          fill="none" 
          stroke="url(#cinnamonGrad)" 
          stroke-width="18" 
          stroke-linecap="round" />

    <!-- DOUGH SPIRAL HIGHLIGHTS (Adds 3D Volume) -->
    <path d="M 256 110 C 350 110, 408 155, 408 230 C 408 310, 340 388, 256 388 C 160 388, 104 310, 104 230" 
          fill="none" stroke="#FFF0D4" stroke-width="6" stroke-linecap="round" opacity="0.4" />
          
    <path d="M 240 150 C 290 150, 342 185, 342 236 C 342 275, 300 322, 256 322 C 200 322, 158 275, 158 236" 
          fill="none" stroke="#FFF0D4" stroke-width="5" stroke-linecap="round" opacity="0.3" />

    <!-- DELICIOUS GLOSS FROSTING / GLAZE -->
    <!-- Center Ooze -->
    <path d="M 230 210 Q 256 190 270 215 Q 290 230 270 250 Q 250 270 230 250 Q 210 230 230 210 Z" 
          fill="url(#glazeGrad)" filter="url(#softShadow)" />
    
    <!-- Drip 1 (Top Right) -->
    <path d="M 320 160 C 340 150, 370 180, 360 200 C 350 210, 335 195, 320 205 C 310 212, 315 230, 305 240 C 295 250, 285 230, 295 210 C 305 190, 300 170, 320 160 Z" 
          fill="url(#glazeGrad)" filter="url(#softShadow)" />

    <!-- Drip 2 (Big Bottom Left Spill) -->
    <path d="M 160 260 C 180 250, 210 270, 200 290 C 190 310, 165 330, 150 350 C 140 365, 125 355, 130 340 C 135 320, 140 270, 160 260 Z" 
          fill="url(#glazeGrad)" filter="url(#softShadow)" />

    <!-- Drip 3 (Cross-cutting Ribbon) -->
    <path d="M 210 135 C 260 130, 290 150, 270 180 C 250 210, 210 180, 190 210 C 175 230, 190 260, 175 270 C 165 280, 155 260, 165 240 C 180 210, 210 215, 225 185 C 240 155, 200 150, 210 135 Z" 
          fill="url(#glazeGrad)" filter="url(#softShadow)" />
          
    <!-- Glaze Shiny Highlights -->
    <path d="M 235 215 Q 245 205 255 210" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <path d="M 165 265 Q 175 260 185 270" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <path d="M 325 170 Q 340 165 345 180" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />

    <!-- BAKING ASSISTANT STAR SPARKLES (App Context) -->
    <!-- Top Left Sparkle -->
    <path d="M 120 130 L 125 145 L 140 150 L 125 155 L 120 170 L 115 155 L 100 150 L 115 145 Z" fill="#FFFFFF" />
    <circle cx="120" cy="150" r="3" fill="#FFD700" />

    <!-- Bottom Right Sparkle -->
    <path d="M 390 340 L 393 350 L 403 353 L 393 356 L 390 366 L 387 356 L 377 353 L 387 350 Z" fill="#FFFFFF" />
    
    <!-- Small Decorative Sugar Dot -->
    <circle cx="395" cy="120" r="6" fill="#FFFFFF" />
    <circle cx="100" cy="290" r="8" fill="#FFFFFF" />
    <circle cx="360" cy="380" r="5" fill="#FFFFFF" />
  </g>
</svg>
